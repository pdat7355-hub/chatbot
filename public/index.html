<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hương Kid - Shop Bé Trai</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>HƯƠNG KID - SHOP BÉ TRAI</header>
    <div id="chat-box">
        <div class="msg bot">Dạ shop Hương Kid chào Đạt! Bạn cần em tư vấn mẫu nào hay xem giá mẫu mô rứa ạ?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Nhắn mẫu SP hoặc SĐT..." onkeypress="handleKey(event)">
        <button id="send-btn" onclick="sendMsg()">➔</button>
    </div>
    <script src="js/chat.js"></script>
</body>
</html>
