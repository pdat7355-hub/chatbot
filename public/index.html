<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hương Kid - Shop</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #0084ff; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: white; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 17px; line-height: 1.5; }
        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 4px; }
        img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
        #input-area { padding: 10px; display: flex; background: white; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); }
        input { flex: 1; border: 1px solid #ddd; padding: 15px; border-radius: 30px; font-size: 16px; outline: none; }
        button { background: #0084ff; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; margin-left: 10px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="header">Hương Kid - Thời trang bé trai</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Nhắn tin cho shop..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
    <script>
        const messageContainer = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender;
            let content = text.replace(/\n/g, '<br>');
            // Biến mã ảnh thành thẻ img
            content = content.replace(/!\[img\]\((.*?)\)/g, '<img src="$1">');
            div.innerHTML = content;
            messageContainer.appendChild(div);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            addMsg(text, 'user');
            input.value = '';
            input.blur(); // Ẩn bàn phím mobile sau khi gửi
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            addMsg(data.reply, 'bot');
        }
        btn.onclick = sendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        window.onload = () => addMsg("Dạ shop Hương Kid chào chị ạ! Chị muốn tìm đồ cho bé nặng bao nhiêu kg ạ?", 'bot');
    </script>
</body>
</html>
