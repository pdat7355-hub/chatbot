<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hương Kid Shop</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            /* Full màn hình tuyệt đối */
            height: 100vh; 
            height: -webkit-fill-available; 
            overflow: hidden;
        }

        #header { 
            background: #0084ff; 
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-size: 22px; 
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: white;
            /* Cuộn mượt trên mobile */
            -webkit-overflow-scrolling: touch; 
        }

        .msg { 
            max-width: 85%; 
            padding: 12px 18px; 
            border-radius: 20px; 
            font-size: 18px; /* Chữ to dễ đọc */
            line-height: 1.5; 
            word-wrap: break-word;
        }

        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 4px; }

        .chat-img { 
            width: 100%; 
            max-width: 280px; 
            border-radius: 12px; 
            margin-top: 10px; 
            display: block; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Khu vực nhập liệu to và không bị che */
        #input-area { 
            padding: 12px 15px; 
            display: flex; 
            background: white; 
            border-top: 1px solid #ddd;
            align-items: center;
            /* Tránh bị ẩn bởi tai thỏ/nút home trên iPhone */
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); 
        }

        input { 
            flex: 1; 
            border: 1px solid #ccc; 
            padding: 15px 20px; 
            border-radius: 30px; 
            font-size: 17px; 
            outline: none; 
            background: #f0f2f5;
        }

        /* Nút gửi lớn, dễ bấm cho ngón tay */
        #sendBtn { 
            background: #0084ff; 
            color: white; 
            border: none; 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            margin-left: 12px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,132,255,0.3);
        }

        #sendBtn svg { width: 26px; height: 26px; fill: white; }
        #sendBtn:active { transform: scale(0.9); }

    </style>
</head>
<body>
    <div id="header">Hương Kid - Shop Bé Trai</div>
    <div id="messages"></div>
    
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Hỏi shop ngay..." autocomplete="off">
        <button id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const messageContainer = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender;
            
            // Xử lý xuống dòng và hiển thị ảnh
            let content = text.replace(/\n/g, '<br>');
            const imgRegex = /\[IMG\](.*?)\[\/IMG\]/g;
            content = content.replace(imgRegex, (match, url) => {
                let cleanUrl = url.trim();
                // Tự sửa link nếu dán nhầm link web ImgBB
                if (cleanUrl.includes("ibb.co") && !cleanUrl.includes("i.ibb.co")) {
                    cleanUrl = cleanUrl.replace("ibb.co/", "i.ibb.co/") + ".jpg";
                }
                return `<img src="${cleanUrl}" class="chat-img" onclick="window.open('${cleanUrl}', '_blank')">`;
            });
            
            div.innerHTML = content;
            messageContainer.appendChild(div);
            
            // Luôn cuộn xuống tin mới nhất
            messageContainer.scrollTo({
                top: messageContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';
            
            // Tự động thu bàn phím để nhìn thấy ảnh dễ hơn
            input.blur();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                addMsg(data.reply, 'bot');
            } catch (e) {
                addMsg("Dạ shop đang bận tí, chị nhắn lại sau vài giây nha!", 'bot');
            }
        }

        btn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        // Lời chào đầu tiên
        window.onload = () => {
            addMsg("Dạ shop Hương Kid chào chị ạ! Chị muốn tìm đồ cho bé nặng bao nhiêu kg ạ?", 'bot');
        };
    </script>
</body>
</html>
