<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hương Kid Shop</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #0084ff; color: white; padding: 12px; text-align: center; font-size: 18px; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: white; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 16px; line-height: 1.4; }
        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 4px; }
        .chat-img { width: 100%; max-width: 220px; border-radius: 12px; margin: 8px 0; display: block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #input-area { padding: 10px; display: flex; background: white; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); }
        input { flex: 1; border: 1px solid #ddd; padding: 10px 15px; border-radius: 20px; font-size: 16px; outline: none; }
        button { background: #0084ff; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; margin-left: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="header">Hương Kid - Shop Bé Trai</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Hỏi shop ngay..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
    <script>
        const messageContainer = document.getElementById('messages');
        const input = document.getElementById('userInput');
        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender;
            let content = text.replace(/\n/g, '<br>');
            // Hiển thị ảnh thông minh
            content = content.replace(/\[IMG\](.*?)\[\/IMG\]/g, '<img src="$1" class="chat-img">');
            div.innerHTML = content;
            messageContainer.appendChild(div);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }
        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            addMsg(text, 'user');
            input.value = '';
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            addMsg(data.reply, 'bot');
        }
        document.getElementById('sendBtn').onclick = sendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        window.onload = () => addMsg("Dạ shop Hương Kid chào chị! Chị muốn tìm đồ cho bé mấy kg ạ?", 'bot');
    </script>
</body>
</html>
