<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hương Kid Shop</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: #f0f2f5; margin: 0; padding: 0;
            display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden;
        }
        #header { 
            background: #0084ff; color: white; padding: 15px; 
            text-align: center; font-size: 20px; font-weight: bold; flex-shrink: 0;
        }
        #messages { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 15px; 
            background: #ffffff; -webkit-overflow-scrolling: touch; 
        }
        .msg { 
            max-width: 85%; padding: 12px 16px; border-radius: 20px; 
            font-size: 17px; line-height: 1.5; word-wrap: break-word;
        }
        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
        .chat-img { 
            width: 100%; max-width: 250px; border-radius: 12px; 
            margin-top: 10px; display: block; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #input-area { 
            flex-shrink: 0; padding: 10px 15px; display: flex; 
            background: white; border-top: 1px solid #ddd; align-items: center;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        input { 
            flex: 1; border: 1px solid #ddd; padding: 12px 18px; 
            border-radius: 25px; font-size: 16px; outline: none; background: #f0f2f5;
        }
        #sendBtn { 
            background: #0084ff; color: white; border: none; 
            width: 50px; height: 50px; border-radius: 50%; 
            margin-left: 10px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
        }
        #sendBtn svg { width: 24px; height: 24px; fill: white; }
    </style>
</head>
<body>
    <div id="header">Hương Kid - Shop Bé Trai</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Hỏi shop ngay..." autocomplete="off">
        <button id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const messageContainer = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        // Lấy hoặc tạo ID người dùng để nhớ tin nhắn
        let userId = localStorage.getItem('hương_kid_userId');
        if (!userId) {
            userId = 'khach_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('hương_kid_userId', userId);
        }

        function addMsg(text, sender, save = true) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender;
            let content = text.replace(/\n/g, '<br>');
            
            // Bộ lọc hiển thị ảnh
            content = content.replace(/\[IMG\](.*?)\[\/IMG\]/g, (match, url) => {
                let u = url.trim();
                if (u.includes("ibb.co") && !u.includes("i.ibb.co")) u = u.replace("ibb.co/", "i.ibb.co/") + ".jpg";
                return `<img src="${u}" class="chat-img" onclick="window.open('${u}', '_blank')">`;
            });
            
            div.innerHTML = content;
            messageContainer.appendChild(div);
            messageContainer.scrollTop = messageContainer.scrollHeight;
            
            // Lưu vào máy khách để thoát ra vào lại vẫn thấy
            if (save) localStorage.setItem('chat_log_' + userId, messageContainer.innerHTML);
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            addMsg(text, 'user');
            input.value = '';
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, userId: userId })
                });
                const data = await res.json();
                addMsg(data.reply, 'bot');
            } catch (e) { addMsg("Hệ thống bận, chị nhắn lại sau nha!", 'bot'); }
        }

        btn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        // Khi load trang: Hiển thị lại chat cũ hoặc lời chào
        window.onload = () => {
            const oldChat = localStorage.getItem('chat_log_' + userId);
            if (oldChat) {
                messageContainer.innerHTML = oldChat;
                messageContainer.scrollTop = messageContainer.scrollHeight;
            } else {
                addMsg("Dạ shop Hương Kid chào chị ạ! Chị muốn tìm đồ cho bé mấy kg ạ?", 'bot', false);
            }
        };
    </script>
</body>
</html>
