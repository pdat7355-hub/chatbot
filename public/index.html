<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hương Kid - Shop</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* Header cố định chữ to */
        #header { 
            background: #0084ff; 
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            z-index: 10;
        }
        
        /* Khu vực tin nhắn */
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #ffffff;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Bong bóng chat */
        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: 17px; 
            line-height: 1.5; 
            word-wrap: break-word; 
            position: relative;
        }
        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
        
        /* Hiển thị hình ảnh trong chat */
        .chat-img { 
            width: 100%; 
            max-width: 250px; 
            border-radius: 12px; 
            margin-top: 8px; 
            display: block; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            cursor: pointer;
        }

        /* Khu vực nhập liệu tối ưu di động */
        #input-area { 
            padding: 10px 15px; 
            border-top: 1px solid #eee; 
            display: flex; 
            background: white; 
            align-items: center; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        
        input { 
            flex: 1; 
            border: 1px solid #ddd; 
            padding: 12px 18px; 
            border-radius: 25px; 
            outline: none; 
            font-size: 16px; /* Để ko bị zoom trên iPhone */
            background: #f0f2f5; 
        }
        
        /* Nút gửi to dễ bấm */
        button { 
            background: #0084ff; 
            color: white; 
            border: none; 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            margin-left: 10px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0;
        }
        button:active { transform: scale(0.9); }
        button svg { width: 24px; height: 24px; fill: white; }

    </style>
</head>
<body>
    <div id="header">Hương Kid - Thời trang bé trai</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Nhắn tin cho shop..." autocomplete="off">
        <button id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const messageContainer = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        // Hàm thêm tin nhắn vào màn hình
        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender;
            
            // 1. Xử lý xuống dòng
            let formattedText = text.replace(/\n/g, '<br>');
            
            // 2. TÌM VÀ BIẾN MÃ ![img](url) THÀNH THẺ ẢNH THẬT
            const imgRegex = /!\[img\]\((.*?)\)/g;
            formattedText = formattedText.replace(imgRegex, (match, url) => {
                return `<img src="${url}" class="chat-img" onclick="window.open('${url}', '_blank')">`;
            });
            
            div.innerHTML = formattedText;
            messageContainer.appendChild(div);
            
            // Cuộn xuống tin nhắn mới nhất
            messageContainer.scrollTo({
                top: messageContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';
            input.blur(); // Thu bàn phím trên điện thoại

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                addMsg(data.reply, 'bot');
            } catch (e) {
                addMsg("Dạ, hệ thống đang bận tí, chị nhắn lại sau nha!", 'bot');
            }
        }

        // Sự kiện click nút gửi
        btn.onclick = sendMessage;

        // Sự kiện nhấn Enter
        input.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };

        // Lời chào khi vừa mở web
        window.onload = () => {
            addMsg("Dạ shop Hương Kid chào chị ạ! Chị muốn tìm đồ cho bé nặng bao nhiêu kg ạ?", 'bot');
        };
    </script>
</body>
</html>
