<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hương Kid Support</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header cố định */
        #header { background: #0084ff; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-shrink: 0; }
        
        /* Khu vực tin nhắn tự co giãn */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #ffffff; }
        
        /* Bong bóng chat to và rõ hơn */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; white-space: pre-wrap; }
        
        /* Khu vực nhập liệu cố định ở đáy màn hình */
        #input-area { padding: 10px 15px; border-top: 1px solid #eee; display: flex; background: white; align-items: center; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        
        input { flex: 1; border: 1px solid #ddd; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; background: #f0f2f5; }
        
        /* Nút gửi to và dễ bấm */
        button { background: #0084ff; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; margin-left: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        button svg { width: 24px; height: 24px; fill: white; }

        /* Tối ưu cho màn hình nhỏ */
        @media (max-width: 480px) {
            .msg { max-width: 90%; font-size: 16px; }
            #header { font-size: 17px; padding: 12px; }
        }
    </style>
</head>
<body>
    <div id="header">Hương Kid - Thời trang bé trai</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Nhắn tin cho shop..." autocomplete="off">
        <button id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const messageContainer = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender;
            div.innerHTML = text.replace(/\n/g, '<br>');
            messageContainer.appendChild(div);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            addMsg(text, 'user');
            input.value = '';
            
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                addMsg(data.reply, 'bot');
            } catch (e) {
                addMsg("Dạ, hệ thống bận, chị nhắn lại sau nha!", 'bot');
            }
        }

        btn.onclick = sendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        window.onload = () => {
            addMsg("Dạ shop Hương Kid chào chị ạ! Chị muốn tìm đồ cho bé nặng bao nhiêu kg ạ?", 'bot');
        };
    </script>
</body>
</html>
