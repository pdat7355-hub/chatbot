<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hương Kid Shop</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: #f0f2f5; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            height: 100vh; /* Cố định chiều cao toàn màn hình */
            overflow: hidden; /* Không cho cả trang web cuộn */
        }

        #header { 
            background: #0084ff; 
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-size: 20px; 
            font-weight: bold;
            flex-shrink: 0; /* Không cho header bị co lại */
        }

        /* Vùng tin nhắn: Chỉ vùng này được phép cuộn */
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #ffffff;
            -webkit-overflow-scrolling: touch; 
        }

        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: 17px; 
            line-height: 1.5; 
            word-wrap: break-word;
        }

        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }

        .chat-img { 
            width: 100%; 
            max-width: 250px; 
            border-radius: 12px; 
            margin-top: 10px; 
            display: block; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Thanh nhập liệu: Cố định luôn nằm dưới cùng màn hình */
        #input-area { 
            flex-shrink: 0; /* Giữ cố định kích thước */
            padding: 10px 15px; 
            display: flex; 
            background: white; 
            border-top: 1px solid #ddd;
            align-items: center;
            /* Tối ưu cho tai thỏ/nút home của điện thoại mới */
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        input { 
            flex: 1; 
            border: 1px solid #ddd; 
            padding: 12px 18px; 
            border-radius: 25px; 
            font-size: 16px; 
            outline: none; 
            background: #f0f2f5;
        }

        #sendBtn { 
            background: #0084ff; 
            color: white; 
            border: none; 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            margin-left: 10px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #sendBtn svg { width: 24px; height: 24px; fill: white; }
        #sendBtn:active { transform: scale(0.9); }

    </style>
</head>
<body>
    <div id="header">Hương Kid - Shop Bé Trai</div>
    
    <div id="messages"></div>
    
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Hỏi shop ngay..." autocomplete="off">
        <button id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const messageContainer = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender;
            
            let content = text.replace(/\n/g, '<br>');
            const imgRegex = /\[IMG\](.*?)\[\/IMG\]/g;
            content = content.replace(imgRegex, (match, url) => {
                let cleanUrl = url.trim();
                if (cleanUrl.includes("ibb.co") && !cleanUrl.includes("i.ibb.co")) {
                    cleanUrl = cleanUrl.replace("ibb.co/", "i.ibb.co/") + ".jpg";
                }
                return `<img src="${cleanUrl}" class="chat-img" onclick="window.open('${cleanUrl}', '_blank')">`;
            });
            
            div.innerHTML = content;
            messageContainer.appendChild(div);
            
            // Tự động cuộn vùng tin nhắn xuống cuối mỗi khi có tin mới
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                addMsg(data.reply, 'bot');
            } catch (e) {
                addMsg("Hệ thống bận, chị nhắn lại sau nha!", 'bot');
            }
        }

        btn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        window.onload = () => {
            addMsg("Dạ shop Hương Kid chào chị ạ! Chị muốn tìm đồ cho bé nặng bao nhiêu kg ạ?", 'bot');
        };
    </script>
</body>
</html>
